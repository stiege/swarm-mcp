name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run pyright src/ || true  # non-blocking until strict mode

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build swarm-agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: swarm-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  import-check:
    name: Import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run python -c "import swarm_mcp; print('swarm_mcp', swarm_mcp.__version__)"
