name: Bug report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to fill out this bug report!"
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear and concise description
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Tool call to reproduce
      description: The exact MCP tool call JSON that triggers the bug
      render: json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Docker version:
        - Python version:
        - swarm-mcp version:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste result.json and/or inspect output if available
      render: json
